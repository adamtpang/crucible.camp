<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Arc Hackathon, a Base, Solana and Bitcoin builder weekend hosted by Arc">
  <defs>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C8102E"/>
      <stop offset="0.55" stop-color="#A10D25"/>
      <stop offset="1" stop-color="#B8892A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#F4EFE6"/>

  <text x="80" y="118" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="22" letter-spacing="5" fill="rgba(26,22,19,0.6)">BASE &#215; SOLANA &#215; BITCOIN &#183; HOSTED BY ARC</text>

  <text x="78" y="320" font-family="Georgia,'Times New Roman',serif" font-weight="800" font-size="124" letter-spacing="-2">
    <tspan fill="#C8102E">ARC</tspan><tspan fill="#1A1613"> HACKATHON</tspan>
  </text>

  <text x="80" y="404" font-family="Georgia,'Times New Roman',serif" font-size="38" fill="#1A1613">The best builders on Base, Solana, and Bitcoin.</text>
  <text x="80" y="452" font-family="Georgia,'Times New Roman',serif" font-size="38" fill="rgba(26,22,19,0.62)">One weekend, one room. Hosted by Arc.</text>

  <rect x="80" y="540" width="1040" height="4" fill="url(#rule)"/>
  <text x="80" y="590" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="21" letter-spacing="2" fill="rgba(26,22,19,0.55)">ARC &#183; THEARCCITY.COM</text>
  <text x="1120" y="590" text-anchor="end" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="21" letter-spacing="2" fill="rgba(26,22,19,0.55)">JULY 10-11, 2026</text>
